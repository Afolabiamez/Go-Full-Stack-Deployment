apiVersion: v1
kind: Namespace
metadata:
  name: muchtodo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: muchtodo-api
  namespace: muchtodo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: muchtodo-api
  template:
    metadata:
      labels:
        app: muchtodo-api
    spec:
      containers:
        - name: muchtodo-api
          image: muchtodo-api-placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_NAME
              value: "much_todo_db"
            - name: JWT_SECRET_KEY
              value: "testsecret"
            - name: ENABLE_CACHE
              value: "true"
            - name: REDIS_ADDR
              value: "://amazonaws.com"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: muchtodo-secrets
                  key: mongo-uri
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
